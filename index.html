<!DOCTYPE html>
<html>
<head>
  <title>US 😄❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .menu button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .game {
      margin-top: 20px;
      display: none;
    }

    canvas {
      background: white;
      border-radius: 10px;
    }

    .secret {
      color: #121212;
      background: #121212;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .revealed {
      color: white;
      background: #333;
    }

  </style>
</head>

<body>

<h1>😄❤️ US Mode ❤️😄</h1>

<div class="menu">
  <button onclick="showGame('draw')">✏️ Draw</button>
  <button onclick="showGame('rapid')">⚡ Rapid</button>
  <button onclick="showGame('fun')">😄 Fun</button>
  <button onclick="showGame('romantic')">❤️ Romantic</button>
  <button onclick="showGame('deep')">🤫 Deep</button>
</div>

<!-- DRAW -->
<div id="draw" class="game">
  <h3>Draw & Guess</h3>
  <div id="word" class="secret" onclick="reveal()">Tap to reveal word</div>
  <br><br>
  <canvas id="canvas" width="300" height="300"></canvas><br>
  <button onclick="clearCanvas()">Clear</button>
  <button onclick="newWord()">New Word</button>
</div>

<!-- RAPID -->
<div id="rapid" class="game">
  <h3>Rapid Fire</h3>
  <div id="rapidQ">Click below</div>
  <button onclick="newRapid()">Next</button>
</div>

<!-- FUN -->
<div id="fun" class="game">
  <h3>Fun Tasks</h3>
  <div id="funQ">Click below</div>
  <button onclick="newFun()">Next</button>
</div>

<!-- ROMANTIC -->
<div id="romantic" class="game">
  <h3>Romantic</h3>
  <div id="romanticQ">Click below</div>
  <button onclick="newRomantic()">Next</button>
</div>

<!-- DEEP -->
<div id="deep" class="game">
  <h3>Deep</h3>
  <div id="deepQ">Click below</div>
  <button onclick="newDeep()">Next</button>
</div>

<script>

// SWITCH
function showGame(id) {
  document.querySelectorAll('.game').forEach(g => g.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

// DRAW WORDS
const words = [
  "Pizza","Dog","Cricket","Train","Teacher","Mobile","Rain","Mountain",
  "Car","Chocolate","Movie","Beach","Laptop","Friend","Exam","Sun",
  "Phone","Ice Cream","Football","Book","Coffee","City","Music","Camera"
];

function newWord() {
  let w = words[Math.floor(Math.random() * words.length)];
  let el = document.getElementById("word");
  el.innerText = w;
  el.classList.remove("revealed");
}

function reveal() {
  document.getElementById("word").classList.add("revealed");
}

// DRAW
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;

canvas.onmousemove = (e) => {
  if (!drawing) return;
  ctx.fillRect(e.offsetX, e.offsetY, 3, 3);
};

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// RAPID (BIG SET)
const rapid = [
  "Pizza or Burger?","Call or Text?","Mountains or Beach?",
  "Night or Morning?","Tea or Coffee?","Movies or Series?",
  "Introvert or Extrovert?","Online or Offline?",
  "Love or Money?","Travel or Stay home?",
  "Music or Silence?","Sleep or Phone?"
];

function newRapid() {
  let q = rapid[Math.floor(Math.random() * rapid.length)];
  document.getElementById("rapidQ").innerText = q;
}

// FUN TASKS
const fun = [
  "Act like me for 30 seconds",
  "Say something in a funny accent",
  "Show the weirdest thing near you",
  "Tell a bad joke",
  "Make a weird face for 5 seconds",
  "Describe me in 3 funny words",
  "Send your funniest photo",
  "Imitate your teacher"
];

function newFun() {
  let q = fun[Math.floor(Math.random() * fun.length)];
  document.getElementById("funQ").innerText = q;
}

// ROMANTIC
const romantic = [
  "What do you miss about me right now?",
  "What’s your favorite memory of us?",
  "What makes you feel loved?",
  "What’s one thing you want to do together?",
  "When do you feel closest to me?",
  "What reminds you of me randomly?"
];

function newRomantic() {
  let q = romantic[Math.floor(Math.random() * romantic.length)];
  document.getElementById("romanticQ").innerText = q;
}

// DEEP
const deep = [
  "What do you need more from me?",
  "What are you afraid to tell me?",
  "What scares you about us?",
  "Where do you see us going?",
  "Have I ever hurt you unknowingly?",
  "What does love mean to you now?"
];

function newDeep() {
  let q = deep[Math.floor(Math.random() * deep.length)];
  document.getElementById("deepQ").innerText = q;
}

</script>

</body>
</html>
