<!DOCTYPE html>
<html>
<head>
  <title>Us – Fun Mode 😄</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .menu button {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .game {
      margin-top: 20px;
      display: none;
    }

    canvas {
      background: white;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>😄 Fun Mode 😄</h1>
<div>Select a game</div>

<div class="menu">
  <button onclick="showGame('draw')">✏️ Draw & Guess</button>
  <button onclick="showGame('act')">🎭 Act & Guess</button>
  <button onclick="showGame('rapid')">⚡ Rapid Fire</button>
  <button onclick="showGame('challenge')">🎲 Random Challenge</button>
</div>

<!-- DRAW GAME -->
<div id="draw" class="game">
  <h3>Draw & Guess</h3>
  <canvas id="canvas" width="300" height="300"></canvas><br>
  <button onclick="clearCanvas()">Clear</button>
</div>

<!-- ACT GAME -->
<div id="act" class="game">
  <h3>Act & Guess</h3>
  <div id="actWord">Click below</div>
  <button onclick="newAct()">New Word</button>
</div>

<!-- RAPID FIRE -->
<div id="rapid" class="game">
  <h3>Rapid Fire</h3>
  <div id="rapidQ">Click below</div>
  <button onclick="newRapid()">Next</button>
</div>

<!-- CHALLENGE -->
<div id="challenge" class="game">
  <h3>Random Challenge</h3>
  <div id="challengeText">Click below</div>
  <button onclick="newChallenge()">Next</button>
</div>

<script>

// SWITCH GAME
function showGame(id) {
  document.querySelectorAll('.game').forEach(g => g.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

// DRAW
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let drawing = false;

canvas.onmousedown = () => drawing = true;
canvas.onmouseup = () => drawing = false;

canvas.onmousemove = (e) => {
  if (!drawing) return;
  ctx.fillRect(e.offsetX, e.offsetY, 3, 3);
};

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ACT WORDS
const actWords = ["Monkey", "Teacher", "Cricketer", "Robot", "Singer", "Baby"];

function newAct() {
  let w = actWords[Math.floor(Math.random() * actWords.length)];
  document.getElementById("actWord").innerText = w;
}

// RAPID FIRE
const rapidQ = [
  "Pizza or Burger?",
  "Call or Text?",
  "Morning or Night?",
  "Tea or Coffee?",
  "Beach or Mountains?"
];

function newRapid() {
  let q = rapidQ[Math.floor(Math.random() * rapidQ.length)];
  document.getElementById("rapidQ").innerText = q;
}

// CHALLENGES
const challenges = [
  "Send your funniest photo right now",
  "Say something in a weird accent",
  "Show your room in 10 seconds",
  "Tell a joke (bad one allowed)",
  "Make a weird face for 5 seconds"
];

function newChallenge() {
  let c = challenges[Math.floor(Math.random() * challenges.length)];
  document.getElementById("challengeText").innerText = c;
}

</script>

</body>
</html>
